<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HackerMind // AI Analyst</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
body { background-color: #10141a; color: #dfe2eb; font-family: 'Hanken Grotesk', sans-serif; }
.glass-panel { backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
.terminal-scroll::-webkit-scrollbar { width: 4px; }
.terminal-scroll::-webkit-scrollbar-thumb { background: #00e639; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor-blink { animation: blink 1s infinite; }
.matrix-overlay {
    background-image: linear-gradient(rgba(0,230,57,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,230,57,0.03) 1px, transparent 1px);
    background-size: 20px 20px;
}
</style>
<script>
tailwind.config = {
  darkMode:"class",
  theme:{extend:{colors:{
    "secondary":"#dab9ff","on-primary":"#003907","surface-container-low":"#181c22",
    "on-background":"#dfe2eb","on-surface":"#dfe2eb","surface-container-lowest":"#0a0e14",
    "secondary-fixed-dim":"#dab9ff","outline":"#84967e","surface-container":"#1c2026",
    "surface":"#10141a","primary-container":"#00ff41","primary-fixed-dim":"#00e639",
    "background":"#10141a","primary":"#ebffe2","outline-variant":"#3b4b37",
    "tertiary-fixed-dim":"#ffba38","on-surface-variant":"#b9ccb2","surface-variant":"#31353c",
    "surface-container-high":"#262a31","error":"#ffb4ab","surface-container-highest":"#31353c"
  },
  fontFamily:{"label-sm":["JetBrains Mono"],"body-md":["Hanken Grotesk"],"headline-md":["Hanken Grotesk"],"code-md":["JetBrains Mono"]},
  fontSize:{
    "headline-md":["24px",{"lineHeight":"1.3","fontWeight":"600"}],
    "label-sm":["12px",{"lineHeight":"1","letterSpacing":"0.1em","fontWeight":"700"}],
    "body-md":["16px",{"lineHeight":"1.6","fontWeight":"400"}],
    "code-md":["14px",{"lineHeight":"1.5","fontWeight":"500"}]
  },
  spacing:{"gutter":"24px","unit":"4px"},
  borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"}
  }}
}
</script>
</head>
<body class="font-body-md text-on-surface overflow-hidden h-screen">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter h-16 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_0_15px_rgba(0,230,57,0.1)]">
  <h1 class="font-headline-md text-headline-md font-bold text-primary-fixed-dim tracking-tighter">HackerMind</h1>
  <span class="font-label-sm text-label-sm text-primary-fixed-dim" id="headerAgent"></span>
</header>

<aside class="fixed left-0 top-0 h-full flex flex-col p-4 gap-4 bg-surface-container-low/50 backdrop-blur-lg border-r border-outline-variant/20 w-64 pt-20">
  <div class="mb-6 px-2">
    <h2 class="font-code-md text-code-md text-primary-fixed-dim">CYBER_OS</h2>
    <p class="font-label-sm text-label-sm text-on-surface-variant opacity-60" id="sidebarAgent"></p>
  </div>
  <div class="flex flex-col gap-1">
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant/30 rounded-lg transition-all" href="/dashboard"><span class="material-symbols-outlined">terminal</span><span class="font-label-sm text-label-sm">Missions</span></a>
    <a class="flex items-center gap-3 px-4 py-3 bg-primary-container text-on-primary-container rounded-lg font-bold" href="/analyst"><span class="material-symbols-outlined">psychology</span><span class="font-label-sm text-label-sm">Analyst</span></a>
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant/30 rounded-lg transition-all" href="/riskmap"><span class="material-symbols-outlined">radar</span><span class="font-label-sm text-label-sm">Risk Map</span></a>
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant/30 rounded-lg transition-all" href="/defense"><span class="material-symbols-outlined">biotech</span><span class="font-label-sm text-label-sm">Defense Lab</span></a>
  </div>
  <div class="mt-auto">
    <a href="/dashboard" class="w-full block text-center py-3 bg-primary-fixed-dim text-on-primary font-label-sm text-label-sm font-bold rounded-lg hover:brightness-110 transition-all">NEW ANALYSIS</a>
  </div>
</aside>

<main class="ml-64 mt-16 h-[calc(100vh-64px)] overflow-hidden matrix-overlay">
<div class="grid grid-cols-12 h-full p-4 gap-4">

<section class="col-span-12 lg:col-span-7 flex flex-col gap-4 h-full">
<div class="glass-panel bg-surface-container-lowest/80 rounded-xl overflow-hidden flex flex-col h-full border-primary-fixed-dim/20">
  <div class="bg-surface-variant/50 px-4 py-2 flex items-center justify-between border-b border-outline-variant/30">
    <div class="flex items-center gap-2">
      <span class="w-3 h-3 rounded-full bg-error"></span>
      <span class="w-3 h-3 rounded-full bg-tertiary-fixed-dim"></span>
      <span class="w-3 h-3 rounded-full bg-primary-fixed-dim"></span>
      <span class="ml-4 font-code-md text-code-md text-on-surface-variant uppercase tracking-widest opacity-70">Analysis_Report</span>
    </div>
    <span class="font-code-md text-code-md text-primary-fixed-dim animate-pulse">COMPLETE</span>
  </div>
  <div class="p-6 font-code-md text-code-md overflow-y-auto terminal-scroll flex-1 space-y-1" id="analysisTerminal" style="max-height: 60vh;">
    <p class="text-on-surface-variant/50">> Loading analysis results...</p>
  </div>
</div>
</section>

<section class="col-span-12 lg:col-span-5 flex flex-col gap-4 h-full overflow-y-auto terminal-scroll pb-10">
<div class="glass-panel bg-surface-container-low p-6 rounded-xl border border-primary-fixed-dim/10">
  <div class="flex items-center justify-between mb-4">
    <span class="font-label-sm text-label-sm text-primary">RISK_INDEX</span>
    <span class="material-symbols-outlined text-tertiary-fixed-dim">warning</span>
  </div>
  <div class="flex flex-col items-center">
    <div class="relative w-32 h-32 flex items-center justify-center">
      <svg class="w-full h-full -rotate-90">
        <circle class="text-surface-variant" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-width="8"></circle>
        <circle id="riskCircle" class="text-primary-fixed-dim" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-dasharray="364.4" stroke-dashoffset="200" stroke-width="8" style="transition: stroke-dashoffset 1s ease;"></circle>
      </svg>
      <span class="absolute font-headline-md text-headline-md text-primary-fixed-dim" id="riskScore">--</span>
    </div>
    <p class="mt-4 font-label-sm text-label-sm text-center uppercase tracking-widest opacity-60" id="riskLabel">Awaiting Analysis</p>
  </div>
</div>

<div class="glass-panel bg-surface-container-low p-6 rounded-xl border border-primary-fixed-dim/10">
  <div class="flex items-center gap-2 mb-4">
    <span class="material-symbols-outlined text-secondary">psychology</span>
    <h3 class="font-headline-md text-headline-md text-secondary">RISK SCORES</h3>
  </div>
  <div class="space-y-3" id="analyticsPanel">
    <p class="text-on-surface-variant text-sm">Run an analysis to see scores.</p>
  </div>
</div>

<div class="glass-panel bg-surface-container-highest/60 rounded-xl flex flex-col border border-secondary/20">
  <div class="p-4 border-b border-white/10 flex items-center justify-between">
    <span class="font-label-sm text-label-sm uppercase tracking-widest">Attack Vectors</span>
    <span class="w-2 h-2 rounded-full bg-primary-fixed-dim shadow-[0_0_5px_#00e639]"></span>
  </div>
  <div class="p-4 flex-1 overflow-y-auto max-h-48" id="attackPanel">
    <p class="text-on-surface-variant text-sm">Waiting for analysis...</p>
  </div>
</div>
</section>

</div>
</main>

<script>
const agentName = localStorage.getItem('hackermind_agent');
if (!agentName) window.location.href = '/';
document.getElementById('headerAgent').textContent = agentName + ' 👾';
document.getElementById('sidebarAgent').textContent = agentName;

const results = localStorage.getItem('hackermind_results');
if (results) {
  const data = JSON.parse(results);
  const terminal = document.getElementById('analysisTerminal');
  const lines = [];
if (data.analysis) lines.push(...data.analysis.split('\n'));
if (data.report) {
  lines.push('');
  lines.push('## SECURITY REPORT SUMMARY');
  lines.push('');
  lines.push(...data.report.split('\n'));
}
if (!lines.length) lines.push('No analysis data');
  terminal.innerHTML = '';
  lines.forEach((line, i) => {
    if (line.trim()) {
      setTimeout(() => {
        const p = document.createElement('p');
        const clean = line.replace(/\*\*/g,'').replace(/#+/g,'').trim();
        p.className = line.startsWith('#') ? 'text-primary-fixed-dim font-bold mt-2' : 'text-on-surface-variant/80 text-sm';
        p.textContent = '> ' + clean;
        terminal.appendChild(p);
        terminal.scrollTop = terminal.scrollHeight;
      }, i * 30);
    }
  });

  const risk = data.overall_risk || 0;
  document.getElementById('riskScore').textContent = risk + '%';
  document.getElementById('riskLabel').textContent = risk > 70 ? 'HIGH CONFIDENCE BREACH' : risk > 40 ? 'MODERATE RISK' : 'LOW RISK';
  const offset = 364.4 - (364.4 * risk / 100);
  setTimeout(() => document.getElementById('riskCircle').setAttribute('stroke-dashoffset', offset), 500);
  if (risk > 70) document.getElementById('riskCircle').style.color = '#ffb4ab';

  const analytics = document.getElementById('analyticsPanel');
  const scores = data.scores || {};
  if (Object.keys(scores).length > 0) {
    analytics.innerHTML = Object.entries(scores).map(([key, val]) => `
      <div class="p-3 bg-surface-variant/30 rounded-lg border border-white/5 mb-2">
        <div class="flex justify-between mb-1">
          <p class="font-label-sm text-label-sm text-secondary-fixed uppercase text-[10px]">${key.replace(/_/g,' ')}</p>
          <span class="text-xs font-bold ${val > 70 ? 'text-error' : val > 40 ? 'text-tertiary-fixed-dim' : 'text-primary-fixed-dim'}">${val}/100</span>
        </div>
        <div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
          <div class="h-full ${val > 70 ? 'bg-error' : val > 40 ? 'bg-tertiary-fixed-dim' : 'bg-primary-fixed-dim'}" style="width:${val}%; transition: width 1s ease;"></div>
        </div>
      </div>
    `).join('');
  }

  const attackPanel = document.getElementById('attackPanel');
  if (data.vulnerabilities) {
    const vulnLines = data.vulnerabilities.split('\n').filter(l => l.trim()).slice(0, 12);
    attackPanel.innerHTML = vulnLines.map(l => `
      <p class="text-xs text-on-surface-variant/80 mb-2 border-l-2 border-error/40 pl-2">${l.replace(/\*\*/g,'').replace(/#+/g,'')}</p>
    `).join('');
  }
} else {
  document.getElementById('analysisTerminal').innerHTML = '<p class="text-error">> No analysis data. <a href="/dashboard" class="text-primary-fixed-dim underline">Run an analysis first.</a></p>';
}
</script>
</body>
</html>

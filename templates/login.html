<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HackerMind // Access Terminal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
body {
    background-color: #10141a;
    background-image: url('/static/bg.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(10, 14, 20, 0.75);
    backdrop-filter: blur(2px);
    z-index: 0;
}
* { position: relative; z-index: 1; }
@keyframes blink { 50% { opacity: 0; } }
.cursor { animation: blink 1s infinite; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.8s ease forwards; }
@keyframes scan {
    0% { top: -10%; }
    100% { top: 110%; }
}
.scanline {
    width: 100%; height: 2px;
    background: rgba(0, 230, 57, 0.08);
    position: fixed;
    animation: scan 6s linear infinite;
    pointer-events: none;
    z-index: 100;
}
.glow-border {
    border: 1px solid rgba(0, 230, 57, 0.3);
    box-shadow: 0 0 30px rgba(0, 230, 57, 0.15), inset 0 0 30px rgba(0, 230, 57, 0.03);
}
@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
}
.float { animation: float 4s ease-in-out infinite; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="scanline"></div>

<div class="w-full max-w-md fade-in float">
    <div class="text-center mb-8">
        <div class="text-[#00e639] text-5xl font-bold tracking-tighter mb-2" style="text-shadow: 0 0 30px rgba(0,230,57,0.5);">HackerMind</div>
        <div class="text-[#b9ccb2] text-xs tracking-[0.3em] uppercase">Cybersecurity Intelligence System</div>
        <div class="flex items-center justify-center gap-2 mt-3">
            <div class="w-2 h-2 rounded-full bg-[#00e639] animate-pulse"></div>
            <span class="text-[#00e639] text-xs tracking-widest">SYSTEM ONLINE</span>
        </div>
    </div>

    <div class="glow-border rounded-xl bg-[#0a0e14]/85 backdrop-blur-xl overflow-hidden">
        <div class="bg-[#181c22]/80 px-4 py-3 flex items-center gap-2 border-b border-white/5">
            <div class="w-3 h-3 rounded-full bg-[#ff5f57]"></div>
            <div class="w-3 h-3 rounded-full bg-[#febc2e]"></div>
            <div class="w-3 h-3 rounded-full bg-[#28c840]"></div>
            <span class="ml-4 text-[#b9ccb2] text-xs tracking-widest uppercase">ACCESS_TERMINAL_v2.4</span>
        </div>

        <div class="p-8">
            <div class="mb-6 text-xs text-[#b9ccb2]/60 space-y-1">
                <p>> Initializing secure connection...</p>
                <p>> Encryption protocol: AES-256 <span class="text-[#00e639]">✓</span></p>
                <p>> Identity verification required</p>
                <p class="flex items-center gap-1">> Awaiting agent identifier <span class="cursor text-[#00e639]">█</span></p>
            </div>

            <div class="mb-6">
                <label class="block text-[#00e639] text-xs tracking-[0.2em] uppercase mb-3">
                    AGENT_IDENTIFIER
                </label>
                <input 
                    type="text" 
                    id="agentName"
                    placeholder="Enter your name..."
                    maxlength="30"
                    class="w-full bg-[#10141a]/80 border border-[#3b4b37] rounded-lg px-4 py-3 text-[#ebffe2] text-sm font-mono focus:outline-none focus:border-[#00e639]/60 focus:ring-1 focus:ring-[#00e639]/30 transition-all placeholder:text-[#b9ccb2]/30"
                    onkeypress="if(event.key === 'Enter') login()"
                />
            </div>

            <button 
                onclick="login()"
                id="loginBtn"
                class="w-full py-3 bg-[#00ff41] text-[#003907] font-bold text-sm tracking-widest uppercase rounded-lg hover:brightness-110 active:scale-95 transition-all shadow-[0_0_20px_rgba(0,230,57,0.4)]">
                INITIALIZE SESSION
            </button>
        </div>
    </div>

    <div class="text-center mt-6 text-[#b9ccb2]/30 text-xs">
        © 2026 HACKERMIND // ENCRYPTED_CONNECTION_ESTABLISHED
    </div>
</div>

<script>
function login() {
    const name = document.getElementById('agentName').value.trim();
    if (!name) {
        const input = document.getElementById('agentName');
        input.focus();
        input.style.borderColor = '#ffb4ab';
        input.style.boxShadow = '0 0 10px rgba(255,180,171,0.3)';
        setTimeout(() => {
            input.style.borderColor = '#3b4b37';
            input.style.boxShadow = 'none';
        }, 1500);
        return;
    }

    const btn = document.getElementById('loginBtn');
    btn.textContent = 'AUTHENTICATING...';
    btn.disabled = true;

    localStorage.setItem('hackermind_agent', name);

    setTimeout(() => {
        window.location.href = '/dashboard';
    }, 800);
}

document.getElementById('agentName').focus();
</script>
</body>
</html>
